name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Login to DockerHub
      uses: docker/login-action@v4
      with:
        username: ${{secrets.DOCKER_USERNAME}}
        password: ${{secrets.DOCKER_PASSWORD}}
    - name: Build and push backend image
      run: |
        docker build -t rambaranwal/devops-test-backend:latest .
        docker push rambaranwal/devops-test-backend:latest
        
    - name: Build and push frontend image
      run: |
        cd frontend
        docker build -t rambaranwal/devops-test-frontend:latest .
        docker push rambaranwal/devops-test-frontend:latest